apiVersion: apps/v1
kind: Deployment
metadata:
  name: digitrans-backend
  labels:
    app: digitrans-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: digitrans-backend
  template:
    metadata:
      labels:
        app: digitrans-backend
    spec:
      containers:
        - name: backend
          # Remplacer REPLACE_WITH_IMAGE par l'image Docker (ex: user/digitrans-backend:latest)
          image: REPLACE_WITH_IMAGE
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "prod"
            - name: SPRING_DATASOURCE_URL
              value: "${RDS_URL}"
            - name: SPRING_DATASOURCE_USERNAME
              value: "${DB_USER}"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "${DB_PASS}"
            - name: APP_JWT_SECRET
              value: "${JWT_SECRET}"
