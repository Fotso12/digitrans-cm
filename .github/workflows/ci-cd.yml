# Pipeline CI/CD pour DIGITRANS-CM
# Jobs: tests, terraform plan/apply, build/push Docker, deploy vers EC2+k0s
name: DIGITRANS-CM CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # 1) Tests unitaires du backend
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurer JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Lancer les tests backend
        working-directory: backend/digitrans-api
        run: mvn -B -DskipTests=false test

  # 2) Terraform plan (vérification)
  terraform-plan:
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - name: Installer Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7
      - name: Terraform init
        working-directory: infrastructure/terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: terraform init -input=false
      - name: Terraform validate
        working-directory: infrastructure/terraform
        run: terraform validate
      - name: Terraform plan
        working-directory: infrastructure/terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform plan -out=tfplan -input=false
      - name: Sauvegarder le plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: infrastructure/terraform/tfplan

  # 3) Terraform apply (sur main seulement)
  terraform-apply:
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Installer Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7
      - name: Télécharger tfplan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infrastructure/terraform
      - name: Terraform apply
        working-directory: infrastructure/terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        run: terraform apply -input=false tfplan
      - name: Exporter outputs Terraform
        working-directory: infrastructure/terraform
        run: terraform output -json > tf_outputs.json
      - name: Sauvegarder outputs
        uses: actions/upload-artifact@v4
        with:
          name: tf-outputs
          path: infrastructure/terraform/tf_outputs.json

  # 4) Build et push des images Docker
  build-and-push:
    runs-on: ubuntu-latest
    needs: terraform-apply
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend/digitrans-api
          file: ./backend/digitrans-api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/digitrans-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/digitrans-backend:${{ github.sha }}

  # 5) Déploiement sur EC2 via SSH (copie du script et exécution)
  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Télécharger outputs Terraform
        uses: actions/download-artifact@v4
        with:
          name: tf-outputs
          path: ./infra-output
      - name: Préparer la clé SSH
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > private_key.pem
          chmod 600 private_key.pem
      - name: Copier scripts et manifests vers EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: '${{ secrets.EC2_SSH_KEY }}'
          port: 22
          source: 'scripts/*,k8s/*'
          target: '/home/ec2-user/'
      - name: Exécuter le script de déploiement sur EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: '${{ secrets.EC2_SSH_KEY }}'
          port: 22
          script: |
            chmod +x /home/ec2-user/deploy_to_ec2.sh
            /home/ec2-user/deploy_to_ec2.sh ${{ secrets.DOCKERHUB_USERNAME }} ${{ secrets.DOCKERHUB_TOKEN }} ${{ secrets.DOCKERHUB_USERNAME }}/digitrans-backend:latest

  # 6) Smoke test simple (vérifie Swagger)
  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy-to-ec2
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Attendre le déploiement
        run: sleep 20
      - name: Tester Swagger
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          curl --fail -sS http://${EC2_HOST}:8080/swagger-ui.html || (echo 'Swagger indisponible' && exit 1)
